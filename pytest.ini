[pytest]
pythonpath = .
testpaths = tests
addopts = -ra --strict-markers -p no:cacheprovider
markers =
    ui: UI end-to-end tests that run through the web application.
    api: API/component tests that call the backend directly.
    component: Focused API behavior tests.
    expected_failure: Scenarios intentionally expected to fail by assignment design.
    collect_all_evidence: Always attach Playwright screenshot, video, and trace artifacts to Allure for this test.

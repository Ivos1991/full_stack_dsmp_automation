services:
  api:
    image: ${API_IMAGE:-ghcr.io/ivos1991/platform-home-assignment-api:assignment-one}
    ports:
      - "8080:8080"
    volumes:
      - sqlite-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_PATH=/app/data/dspm.db
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "sh", "/app/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE:-ghcr.io/ivos1991/platform-home-assignment-web:assignment-one}
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite-data:
